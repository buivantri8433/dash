<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Dashboard truy cập nhanh các link thường dùng của Bùi Văn Trí">
    <meta name="theme-color" content="#6366f1">
    <title>My Links Dashboard</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔗</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="bg-ornament" aria-hidden="true">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <div class="dashboard-container">
        <!-- Header -->
        <header class="header">
            <div class="header-content">
                <p class="greeting" id="greeting">Xin chào 👋</p>
                <h1 class="title">My Links</h1>
                <p class="subtitle">Truy cập nhanh mọi thứ bạn cần, ở một nơi.</p>
            </div>
            <div class="header-controls">
                <div class="search-wrap">
                    <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <circle cx="11" cy="11" r="8"></circle>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                    </svg>
                    <input type="text" class="search-box" id="searchBox" placeholder="Tìm kiếm link..." autocomplete="off" aria-label="Tìm kiếm link">
                    <kbd class="search-kbd">Ctrl K</kbd>
                </div>
                <button class="btn-theme" id="themeBtn" aria-label="Chuyển chế độ sáng/tối">🌙</button>
            </div>
        </header>

        <!-- Nút lọc danh mục (tự động tạo từ links.js) -->
        <nav class="filter-section" id="filterSection" aria-label="Lọc theo danh mục"></nav>

        <!-- Lưới link (tự động tạo từ links.js) -->
        <main class="links-container" id="linksContainer"></main>

        <!-- Không có kết quả -->
        <div class="no-results" id="noResults" style="display: none;">
            <div class="no-results-emoji">🔍</div>
            <p>Không tìm thấy link nào</p>
            <span>Thử từ khoá khác hoặc chọn "Tất cả"</span>
        </div>

        <footer class="footer">
            <p><span id="linkCount"></span> · Made with ❤️ by Bùi Văn Trí</p>
        </footer>
    </div>

    <noscript>
        <p style="text-align: center; padding: 2rem;">Trang này cần bật JavaScript để hiển thị danh sách link.</p>
    </noscript>

    <script src="links.js"></script>
    <script src="script.js"></script>
</body>
</html>
